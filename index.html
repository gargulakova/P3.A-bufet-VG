<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>
<style>
body {
 font-family: Arial, sans-serif;
 background: #f4f7fb;
}
h1 {
 text-align: center;
 background: #2a72d4;
 color: white;
 padding: 20px;
}
.container {
 width: 90%;
 max-width: 500px;
 margin: 30px auto;
 background: white;
 padding: 25px;
 border-radius: 12px;
}
.item {
 display: flex;
 justify-content: space-between;
 margin: 12px 0;
 font-size: 18px;
}
input[type="number"], input[type="text"], input[type="tel"] {
 width: 100%;
 padding: 8px;
 margin-top: 5px;
 border-radius: 6px;
 border: 1px solid #ccc;
}
label {
 font-weight: bold;
 margin-top: 15px;
 display: block;
}
#celkem, #pocet {
 text-align: center;
 font-size: 22px;
 margin-top: 15px;
 font-weight: bold;
 color: #2a72d4;
}
button {
 width: 100%;
 padding: 15px;
 margin-top: 30px;
 font-size: 24px;
 background: #ff6b35;
 color: white;
 border: none;
 border-radius: 10px;
 cursor: pointer;
}
button:hover {
 background: #e85a28;
}
</style>
</head>

<body>
<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

  <div id="items"></div>

  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>

  <!-- ✅ NOVÁ POLE – zákazník musí vyplnit -->
  <label>VAŠE JMÉNO:</label>
  <input type="text" id="jmeno" placeholder="Např. Garguláková Vendula">

  <label>TELEFON:</label>
  <input type="tel" id="telefon" placeholder="+420 773 206 098">

  <!-- ✅ TLAČÍTKO S FUNKCÍ MAILTO -->
  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>
</div>

<script>
let items = [];

// ✅ načítání CSV
async function loadCSV() {
 try {
  const response = await fetch("data_bufet.csv?t=" + Date.now());
  const text = await response.text();
  parseCSV(text);
  renderItems();
 } catch (err) {
  alert("Chyba načítání CSV.");
 }
}

// ✅ parsování CSV
function parseCSV(text) {
 items = [];
 const lines = text.split("\n");

 for (let i = 1; i < lines.length; i++) {
  const line = lines[i].trim();
  if (!line) continue;

  const [nazev, cena] = line.split(";");
  items.push({
   nazev: nazev,
   cena: parseFloat(cena),
   mnozstvi: 0
  });
 }
}

// ✅ vykreslení položek
function renderItems() {
 const container = document.getElementById("items");
 container.innerHTML = "";

 items.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
